<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="/img/icon.png">
    <link rel="stylesheet" href="/css/style.css">
    <title>Validação de CPF</title>
</head>
<body class="d-flex align-items-center" style="background-color:#0B3D2E;">

    <div class="container p-5 d-flex justify-content-center align-items-center min-vh-100">
        <form class="p-4 rounded bg-white w-100" style="max-width: 500px;" action="#" method="POST">
            <h2 class="text-center mb-4"><strong>Digite seu CPF</strong></h2>
            <div class="mb-3">
                <input  type="text" id="cpf" name="cpf" placeholder="Digite apenas os números de seu CPF" maxlength="14" class="form-control text-center" required>
            </div>
            <div class="d-grid gap-2">
                <button class="btn btn-success w-100" type="submit">Enviar</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
    <script src="/js/validacao.js"></script>
</body>
</html>
